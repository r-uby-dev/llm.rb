                  "text": "Here\u2019s a detailed and fully up-to-date summary of today\u2019s top global and U.S. news\u2014Friday, June 26, 2026:\n\n---\n\n## International News\n\n**1. Europe Suffers Deadly Record-Breaking Heatwave**  \nEurope continues to reel under an extreme heatwave, with multiple countries grappling with dangerously high temperatures and tragic loss of life.\n\n  - More than 101 million Europeans are expected to experience temperatures above 35\u202f\u00b0C (95\u202f\u00b0F) ([abc.net.au](https://www.abc.net.au/news/2026-06-26/hundreds-of-deaths-recorded-as-heatwave-grips-europe/106843702?utm_source=openai)).  \n  - Between Sunday and Wednesday, Spain\u2019s MoMo mortality monitoring system attributed 212 deaths to the heat ([abc.net.au](https://www.abc.net.au/news/2026-06-26/hundreds-of-deaths-recorded-as-heatwave-grips-europe/106843702?utm_source=openai)).  \n  - The UK recorded its hottest-ever June day\u201436.4\u202f\u00b0C in Somerset\u2014prompting a surge in emergency \"Category\u202f1\" calls, with 642 life-threatening incidents in a single day ([abc.net.au](https://www.abc.net.au/news/2026-06-26/hundreds-of-deaths-recorded-as-heatwave-grips-europe/106843702?utm_source=openai)).  \n  - In France, heat-related incidents have increased sharply: a three-year-old boy died in a hot vehicle outside Paris, two other children reportedly died in similar circumstances, and at least 48 people drowned ([abc.net.au](https://www.abc.net.au/news/2026-06-26/hundreds-of-deaths-recorded-as-heatwave-grips-europe/106843702?utm_source=openai)). Paramedics in Paris reported 25 cardiac arrests in 24 hours, compared to fewer than 10 on a typical day, and emergency room visits quadrupled ([abc.net.au](https://www.abc.net.au/news/2026-06-26/hundreds-of-deaths-recorded-as-heatwave-grips-europe/106843702?utm_source=openai)). Authorities have also banned public alcohol consumption in Paris from midday onward to prevent exacerbating dehydration and health risks ([abc.net.au](https://www.abc.net.au/news/2026-06-26/hundreds-of-deaths-recorded-as-heatwave-grips-europe/106843702?utm_source=openai)).  \n  - Switzerland broke June records with 38\u202f\u00b0C in Basel ([abc.net.au](https://www.abc.net.au/news/2026-06-26/hundreds-of-deaths-recorded-as-heatwave-grips-europe/106843702?utm_source=openai)). The Netherlands issued its first-ever red alert for heat, while Germany, Austria, Italy, and the Czech Republic also face escalating temperatures ([abc.net.au](https://www.abc.net.au/news/2026-06-26/hundreds-of-deaths-recorded-as-heatwave-grips-europe/106843702?utm_source=openai)).\n\n**2. U.S.\u2013Iran Peace Talks Advance Roadmap Agreement**  \nHigh-level diplomatic talks between the United States and Iran concluded successfully, with mediators reporting promising progress.\n\n  - Hosted in Switzerland, the negotiations resulted in a collective roadmap designed to culminate in a final agreement within 60 days ([washingtonpost.com](https://www.washingtonpost.com/world/2026/06/21/us-iranian-meet-switzerland-hash-out-peace-plan/?utm_source=openai)).  \n  - A de-escalation working group\u2014featuring Lebanon, alongside the U.S. and Iran\u2014will address the conflict between Israel and Hezbollah ([washingtonpost.com](https://www.washingtonpost.com/world/2026/06/21/us-iranian-meet-switzerland-hash-out-peace-plan/?utm_source=openai)).  \n  - Despite the encouraging trajectory, developments were shaken by President Trump\u2019s pre-talk threats, which included warnings of potential U.S. military action and seizure of the Strait of Hormuz if Iran interfered with maritime navigation ([washingtonpost.com](https://www.washingtonpost.com/world/2026/06/21/us-iranian-meet-switzerland-hash-out-peace-plan/?utm_source=openai)).\n\n---\n\n## U.S. News\n\n**3. Supreme Court Rules to End Deportation Protections for Syrians and Haitians**  \nIn a significant ruling, the U.S. Supreme Court has sided with the Trump administration in halting judicial delays on ending Temporary Protected Status (TPS) for Syrian and Haitian immigrants.\n\n  - The Court affirmed that the TPS statute bars judicial review of non\u2011constitutional challenges\u2014effectively permitting the administration to terminate protections without court-imposed reprieves ([cbsnews.com](https://www.cbsnews.com/news/supreme-court-temporary-protected-status-syrians-haitians/?utm_source=openai)).  \n  - The decision affects more than 356,000 individuals (over 6,000 from Syria and 350,000 from Haiti) by allowing the termination of their legal protections to move forward ([cbsnews.com](https://www.cbsnews.com/news/supreme-court-temporary-protected-status-syrians-haitians/?utm_source=openai)).\n\n---\n\n## U.S. Domestic and Policy News\n\n**4. FERC Orders Grid Reform to Support Large Energy Loads**  \nThe Federal Energy Regulatory Commission (FERC) has taken steps to modernize the U.S. electric grid in response to the growing demands of large energy users like data centers and manufacturers.\n\n  - On June 18, FERC issued show-cause orders to all six regional grid operators\u2014PJM, MISO, SPP, CAISO, ISO-NE, and NYISO\u2014requiring them to justify or reform their tariffs for large loads within 60 days ([ferc.gov](https://www.ferc.gov/news-events/news/ferc-launches-aggressive-targeted-action-speed-large-load-integration?utm_source=openai)).  \n  - The reforms target five key areas: streamlining transmission applications, ensuring cost transparency, accommodating behind\u2011the\u2011meter generation, offering new services for flexible loads, and improving infrastructure planning for co-located generators ([ferc.gov](https://www.ferc.gov/news-events/news/ferc-launches-aggressive-targeted-action-speed-large-load-integration?utm_source=openai)).  \n  - Within 30 days, each operator must also provide plans for ensuring sufficient generation capacity to meet current and future demands ([ferc.gov](https://www.ferc.gov/news-events/news/ferc-launches-aggressive-targeted-action-speed-large-load-integration?utm_source=openai)). FERC Chair Laura Swett emphasized that the initiative aims to serve innovation, support AI-driven industries, and strengthen U.S. manufacturing while maintaining consumer protections ([ferc.gov](https://www.ferc.gov/news-events/news/ferc-launches-aggressive-targeted-action-speed-large-load-integration?utm_source=openai)).\n\n---\n\n## Summary Overview\n\n- **Europe faces a catastrophic heatwave**, causing hundreds of deaths and widespread strain on healthcare and emergency systems.\n- **U.S.\u2013Iran talks show glimmer of diplomatic progress**, with a roadmap aimed at peace and de-escalation protocols underway.\n- **Domestic U.S. policy sees major shifts**: Supreme Court limits deportation protections for Syrians and Haitians, and FERC mandates grid reform to support energy-intensive economic growth.\n\n---\n\nLet me know if you\u2019d like a deeper dive into any of these stories or a focus on another region or topic!"
